<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School AI Tutor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .chat-container {
        width: auto; /* Fixed responsive width */
        height: 650px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .chat-header {
        background: linear-gradient(135deg, #ff6a00, #ee0979);
        color: white;
        padding: 15px;
        font-size: 20px;
        text-align: center;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .messages {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        background: #f9f9ff;
        display: flex;
        flex-direction: column;
    }

    .message {
        margin: 10px 0;
        padding: 12px 16px;
        border-radius: 15px;
        max-width: 75%;
        animation: fadeIn 0.3s ease-in-out;
        line-height: 1.5;
        white-space: normal;
        word-wrap: break-word;
    }

    .user {
        background: #667eea;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 5px;
    }

    .bot {
        background: #e0e0ff;
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 5px;
    }

    .input-area {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
        background: white;
    }

    .input-area input {
        flex: 1;
        padding: 10px;
        border-radius: 25px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 14px;
    }

    .input-area button {
        margin-left: 10px;
        padding: 10px 18px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(135deg, #ff6a00, #ee0979);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .input-area button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .typing {
        font-size: 12px;
        color: gray;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        📚 AI School Tutor
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="question"
               placeholder="Ask your question..."
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

function formatResponse(text) {

    // Convert **bold** to <b>
    text = text.replace(/\*\*(.*?)\*\*/g, "<b>");

    // Convert numbered lists to new lines
    text = text.replace(/\n\d+\.\s/g, "<br>");

    // Convert remaining line breaks
    text = text.replace(/\n/g, "<br>");

    return text;
}

async function sendMessage() {
    const input = document.getElementById("question");
    const message = input.value.trim();
    if (!message) return;

    const messagesDiv = document.getElementById("messages");

    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.textContent = message;
    messagesDiv.appendChild(userMsg);

    input.value = "";

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "AI is thinking...";
    messagesDiv.appendChild(typing);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    try {
        const response = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: message })
        });

        const data = await response.json();

        messagesDiv.removeChild(typing);

        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerHTML = formatResponse(data.answer);  // IMPORTANT CHANGE
        messagesDiv.appendChild(botMsg);

        messagesDiv.scrollTop = messagesDiv.scrollHeight;

    } catch (error) {
        typing.textContent = "Error contacting AI service.";
    }
}
</script>

</body>
</html>
